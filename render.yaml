services:
  - type: web
    name: meet-zool-api
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: meet-zool-api
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        sync: false

  - type: static
    name: meet-zool-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE
        sync: false
