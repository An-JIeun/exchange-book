services:
  mysql:
    image: mysql:8.0
    container_name: meet-zool-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: meet_zool
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meet-zool-api
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: meet-zool-api
      APP_ENV: dev
      DATABASE_URL: mysql+pymysql://root:password@mysql:3306/meet_zool
    ports:
      - "8000:8080"

volumes:
  mysql_data:
